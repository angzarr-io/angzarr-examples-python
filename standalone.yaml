# Standalone mode configuration for Python Poker example
# Compatible with test-coverage/angzarr-standalone binary

storage:
  type: sqlite

transport:
  type: uds
  uds:
    base_path: ./tmp

messaging:
  type: ipc
  ipc:
    base_path: ./tmp

standalone:
  aggregates:
    - domain: player
      socket: ./tmp/ch-player.sock
      command: ["uv", "run", "python", "-m", "player.agg.main"]
      env:
        PYTHONPATH: "."
        UDS_BASE_PATH: ./tmp
        TRANSPORT_TYPE: uds
        SERVICE_NAME: business
        DOMAIN: player
      storage:
        type: sqlite
        sqlite:
          path: ./data/player.db

    - domain: table
      socket: ./tmp/ch-table.sock
      command: ["uv", "run", "python", "-m", "table.agg.main"]
      env:
        PYTHONPATH: "."
        UDS_BASE_PATH: ./tmp
        TRANSPORT_TYPE: uds
        SERVICE_NAME: business
        DOMAIN: table
      storage:
        type: sqlite
        sqlite:
          path: ./data/table.db

    - domain: hand
      socket: ./tmp/ch-hand.sock
      command: ["uv", "run", "python", "-m", "hand.agg.main"]
      env:
        PYTHONPATH: "."
        UDS_BASE_PATH: ./tmp
        TRANSPORT_TYPE: uds
        SERVICE_NAME: business
        DOMAIN: hand
      storage:
        type: sqlite
        sqlite:
          path: ./data/hand.db

  sagas:
    - domain: saga-table-hand
      listen_domain: table
      command: ["uv", "run", "python", "table/saga-hand/main.py"]
      env:
        PYTHONPATH: "."
        UDS_BASE_PATH: ./tmp
        TRANSPORT_TYPE: uds

    - domain: saga-hand-table
      listen_domain: hand
      command: ["uv", "run", "python", "hand/saga-table/main.py"]
      env:
        PYTHONPATH: "."
        UDS_BASE_PATH: ./tmp
        TRANSPORT_TYPE: uds

    - domain: saga-table-player
      listen_domain: table
      command: ["uv", "run", "python", "table/saga-player/main.py"]
      env:
        PYTHONPATH: "."
        UDS_BASE_PATH: ./tmp
        TRANSPORT_TYPE: uds

    - domain: saga-hand-player
      listen_domain: hand
      command: ["uv", "run", "python", "hand/saga-player/main.py"]
      env:
        PYTHONPATH: "."
        UDS_BASE_PATH: ./tmp
        TRANSPORT_TYPE: uds

  process_managers:
    - domain: hand-flow
      subscriptions: "table;hand"
      command: ["uv", "run", "python", "hand-flow/main.py"]
      env:
        PYTHONPATH: "."
        UDS_BASE_PATH: ./tmp
        TRANSPORT_TYPE: uds

  projectors:
    - domain: prj-output
      listen_domain: player
      command: ["uv", "run", "python", "prj-output/main.py"]
      env:
        PYTHONPATH: "."
        UDS_BASE_PATH: ./tmp
        TRANSPORT_TYPE: uds
        SERVICE_NAME: projector
        PROJECTOR_NAME: output
        HAND_LOG_FILE: ./hand_log.txt

  gateway:
    enabled: true
    port: 9084
