# Python poker example - local development values

replicaCount: 1

# Use local Kind registry
imagePullSecrets: []

storage:
  type: postgres
  postgres:
    host: "angzarr-db-rw"
    port: 5432
    database: "angzarr"
    username: "angzarr"
    password: "angzarr"
    uri: "postgres://angzarr:angzarr@angzarr-db-rw:5432/angzarr"

messaging:
  type: amqp
  amqp:
    enabled: true
    host: "angzarr-mq"
    port: 5672
    url: "amqp://angzarr:angzarr@angzarr-mq:5672"

# Poker domain aggregates
applications:
  business:
    - name: poker-player
      domain: player
      port: 50301
      image:
        repository: ghcr.io/angzarr-io/poker-python-player
        tag: latest
        pullPolicy: IfNotPresent

    - name: poker-table
      domain: table
      port: 50302
      image:
        repository: ghcr.io/angzarr-io/poker-python-table
        tag: latest
        pullPolicy: IfNotPresent

    - name: poker-hand
      domain: hand
      port: 50303
      image:
        repository: ghcr.io/angzarr-io/poker-python-hand
        tag: latest
        pullPolicy: IfNotPresent

  # Sagas to be added later
  sagas: []

  # Projectors
  projectors:
    - name: prj-training
      domain: hand
      port: 50491
      topics:
        - "hand"  # Subscribe to hand domain events
      image:
        repository: ghcr.io/angzarr-io/poker-python-prj-training
        tag: latest
        pullPolicy: IfNotPresent

# Infrastructure settings
infrastructure:
  gateway:
    enabled: true
    grpcTarget: "table-aggregate:1310"  # Points to table aggregate service
    descriptorConfigMap: "gateway-descriptor"

# Resource limits for development
resources:
  requests:
    memory: "64Mi"
    cpu: "50m"
  limits:
    memory: "256Mi"
    cpu: "250m"

applicationResources:
  requests:
    memory: "64Mi"
    cpu: "50m"
  limits:
    memory: "256Mi"
    cpu: "250m"
