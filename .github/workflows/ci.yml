name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  UV_VERSION: "0.10.3"

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/angzarr-io/angzarr-python:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Configure git safe directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Use container justfile
        run: cp justfile.container justfile

      - name: Update uv
        run: |
          curl -LsSf https://astral.sh/uv/${{ env.UV_VERSION }}/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: just install

      - name: Test (unit)
        run: just test-unit

      - name: Lint
        run: just lint

      - name: Format check
        run: just fmt --check
