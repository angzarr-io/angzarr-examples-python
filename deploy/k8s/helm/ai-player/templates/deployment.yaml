apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ai-player.fullname" . }}
  labels:
    {{- include "ai-player.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.aiPlayer.replicas }}
  selector:
    matchLabels:
      {{- include "ai-player.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "ai-player.selectorLabels" . | nindent 8 }}
    spec:
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z {{ .Values.aiPlayer.database.host }} {{ .Values.aiPlayer.database.port }}; do
                echo "Waiting for database..."
                sleep 2
              done
              echo "Database is ready"
      containers:
        - name: ai-player
          image: "{{ .Values.aiPlayer.image.repository }}:{{ .Values.aiPlayer.image.tag }}"
          imagePullPolicy: {{ .Values.aiPlayer.image.pullPolicy }}
          ports:
            - name: grpc
              containerPort: {{ .Values.aiPlayer.port }}
              protocol: TCP
          env:
            - name: PORT
              value: {{ .Values.aiPlayer.port | quote }}
            - name: DATABASE_URL
              value: {{ include "ai-player.databaseUrl" . | quote }}
            - name: MODEL_PATH
              value: /models/current/poker.pt
            - name: LOG_LEVEL
              value: {{ .Values.aiPlayer.env.LOG_LEVEL }}
            - name: DEVICE
              value: {{ .Values.aiPlayer.env.DEVICE }}
            - name: MAX_WORKERS
              value: {{ .Values.aiPlayer.env.MAX_WORKERS | quote }}
          resources:
            {{- toYaml .Values.aiPlayer.resources | nindent 12 }}
          volumeMounts:
            - name: models
              mountPath: /models
          {{- with .Values.aiPlayer.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.aiPlayer.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: models
          {{- if .Values.aiPlayer.models.pvc.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "ai-player.fullname" . }}-models
          {{- else }}
          emptyDir: {}
          {{- end }}
