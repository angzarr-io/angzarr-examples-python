kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: poker-ai
nodes:
  - role: control-plane
    extraPortMappings:
      # Gateway for game commands
      - containerPort: 30084
        hostPort: 9084
        protocol: TCP
      # Stream service for events
      - containerPort: 31340
        hostPort: 1340
        protocol: TCP
      # AI Player gRPC service
      - containerPort: 30500
        hostPort: 50500
        protocol: TCP
      # PostgreSQL (optional direct access)
      - containerPort: 30432
        hostPort: 5432
        protocol: TCP
